name: Release

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Thin caller for the canonical reusable release pipeline. The build →
# semantic-release → Docker → MCP Registry → security chain (tag-based release
# detection + correct gating) lives in wyre-technology/.github so every *-mcp
# repo stays in lockstep instead of drifting per-repo. PR-time lint/test gating
# is each repo's ci.yml concern; this workflow only runs the release path.
# Caller jobs grant the token scopes the reusable jobs request (a reusable can
# only reduce, never expand, caller-granted scope).
jobs:
  release:
    permissions:
      contents: write
      issues: write
      packages: write
      id-token: write
      security-events: write
    uses: wyre-technology/.github/.github/workflows/mcp-server-release.yml@a925b43adb22aa8885b8243e1056e6a42cdce4d1
    with:
      server-name: itglue-mcp
      image-name: ghcr.io/wyre-technology/itglue-mcp
    secrets: inherit

  # The reusable pipeline does not pack or attach the Claude Desktop .mcpb
  # bundle (dropped when the hand-rolled workflow was replaced in #61, which
  # is why v1.13.0 shipped with no assets). Restore it here until the step
  # is upstreamed into mcp-server-release.yml.
  mcpb:
    name: Pack and upload MCPB bundle
    runs-on: ubuntu-latest
    needs: release
    if: needs.release.outputs.released == 'true'
    permissions:
      contents: write
    steps:
      - name: Checkout release tag
        uses: actions/checkout@v7
        with:
          ref: ${{ needs.release.outputs.tag_name }}
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
      - name: Stamp released version into package.json
        # semantic-release does not commit the version bump back to the repo,
        # and pack-mcpb.cjs copies package.json's version into manifest.json.
        # Without this stamp the bundle ships with a stale version (v1.12.0's
        # bundle said 1.5.3).
        env:
          VERSION: ${{ needs.release.outputs.version }}
        run: npm version "$VERSION" --no-git-tag-version
      - name: Pack MCPB bundle
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          npm install -g @anthropic-ai/mcpb
          npm run pack:mcpb
      - name: Upload bundle to GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ needs.release.outputs.tag_name }}
        run: |
          BUNDLE_NAME=$(node -p "require('./package.json').name.replace(/^@.*\\//, '')")
          gh release upload "$TAG_NAME" "${BUNDLE_NAME}.mcpb" \
            --repo "${{ github.repository }}" --clobber

  deploy:
    needs: release
    if: needs.release.outputs.released == 'true'
    permissions:
      id-token: write
      contents: read
    uses: wyre-technology/.github/.github/workflows/mcp-server-deploy.yml@a61021de876d0fd44dac777fa90f963fea25b0c3
    with:
      vendor-slug: itglue
      image-name: ghcr.io/wyre-technology/itglue-mcp
      digest: ${{ needs.release.outputs.digest }}
      version: ${{ needs.release.outputs.version }}
    secrets: inherit